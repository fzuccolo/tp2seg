name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate data
        run: make validate

      - name: Run tests
        run: make test

      - name: Build deliverables
        run: make build

      - name: Upload generated deliverables
        uses: actions/upload-artifact@v4
        with:
          name: salidas-tp2
          path: salidas/
          retention-days: 30
