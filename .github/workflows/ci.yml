name: CI y Entregables TP2

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate data
        run: make validate

      - name: Run tests
        run: make test

      - name: Build deliverables
        run: make build

      - name: Upload presentation
        uses: actions/upload-artifact@v4
        with:
          name: tp2-tecnohogar-presentacion
          path: .build/tecnohogar/slides/
          if-no-files-found: error
          retention-days: 90

      - name: Upload executive report
        uses: actions/upload-artifact@v4
        with:
          name: tp2-tecnohogar-informe-ejecutivo
          path: .build/tecnohogar/informe/
          if-no-files-found: error
          retention-days: 90

      - name: Upload generated deliverables
        uses: actions/upload-artifact@v4
        with:
          name: tp2-build-completo
          path: .build/
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 30

      - name: Publish artifact summary
        run: |
          {
            echo "## Entregables TP2"
            echo ""
            echo "Descargar desde la seccion **Artifacts** de esta corrida:"
            echo ""
            echo "- **tp2-tecnohogar-presentacion**: presentacion HTML lista para exponer."
            echo "- **tp2-tecnohogar-informe-ejecutivo**: informe ejecutivo HTML."
            echo "- **tp2-build-completo**: metricas, CSV, informe, slides y salidas completas."
            echo ""
            echo "Corrida: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Update deploy branch
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git push origin HEAD:deploy
