name: CI y Entregables TP2

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compute build timestamp
        id: meta
        run: |
          timestamp="$(date -u +'%Y%m%d-%H%M%S')"
          echo "timestamp=${timestamp}" >> "$GITHUB_OUTPUT"
          echo "BUILD_TIMESTAMP=${timestamp}" >> "$GITHUB_ENV"

      - name: Validate data
        run: make validate

      - name: Run tests
        run: make test

      - name: Build deliverables
        run: make build

      - name: Upload downloadable deliverables
        uses: actions/upload-artifact@v4
        with:
          name: tp2-tecnohogar-entregables
          path: .build/entregables/
          if-no-files-found: error
          retention-days: 90

      - name: Publish release downloads
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: entregables-${{ steps.meta.outputs.timestamp }}
        run: |
          gh release create "$RELEASE_TAG" \
            .build/entregables/tp2-tecnohogar-presentacion.pptx \
            .build/entregables/tp2-tecnohogar-informe.pdf \
            .build/entregables/tp2-tecnohogar-entregables.zip \
            --title "Entregables TP2 ${{ steps.meta.outputs.timestamp }}" \
            --notes "Descargas generadas por CI: presentacion PPTX, informe PDF y ZIP completo." \
            --latest

      - name: Publish artifact summary
        run: |
          {
            echo "## Entregables TP2"
            echo ""
            if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF}" = "refs/heads/main" ]; then
              echo "Descarga permanente desde la ultima Release:"
              echo ""
              echo "- PPTX: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/latest/download/tp2-tecnohogar-presentacion.pptx"
              echo "- PDF: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/latest/download/tp2-tecnohogar-informe.pdf"
              echo "- ZIP: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/latest/download/tp2-tecnohogar-entregables.zip"
              echo ""
            fi
            echo "Artifact temporal de esta corrida: **tp2-tecnohogar-entregables**."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Update deploy branch
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git push origin HEAD:deploy
